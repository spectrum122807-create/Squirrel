<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Squirrel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Squirrel ghost background -->
<img src="{{ url_for('static', filename='squirrel_logo-removebg-preview.png') }}" class="bg-squirrel">

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <img src="{{ url_for('static', filename='squirrel_logo-removebg-preview.png') }}" class="logo">
        <h1 class="logo-text">SQUIRREL</h1>
        <p>- Our digital market place -</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-card">
        <h2>Log in</h2>

        <form method="POST" action="/">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <div class="forgot-box">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Log in</button>

            <p class="signup-text">
                Don't have an account?
                <a href="/signup">Sign up</a>
            </p>


        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>

</div>

</body>
</html>
